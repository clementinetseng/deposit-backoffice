<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <!-- Google Fonts for modern look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <h1>Promotion Admin</h1>
      <span class="brand-icon" style="margin-left:auto">≡</span>
    </div>
    <nav class="nav-menu">
      <a href="#" class="nav-item active" data-route="promotions" onclick="navigateTo('promotions', event)">
        <span style="font-size:1.1em">⚙️</span> Promotion List
      </a>
      <a href="#" class="nav-item" data-route="reward-history" onclick="navigateTo('reward-history', event)">
        <span style="font-size:1.1em">🏆</span> Reward History
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="avatar" style="font-size:0.7em">AD</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:0.85rem">Admin User</div>
        <div style="font-size:0.7rem;color:var(--text-light)">admin@example.com</div>
      </div>
    </div>
  </aside>

  <!-- Main Layout -->
  <div class="main-wrapper">
    <!-- Header removed, using inline content headers like Figma -->

    <!-- Content Area -->
    <main class="content-area" id="contentArea">
      <!-- SPA Content injected here by admin.js -->
    </main>
  </div>

  <!-- Global Modal Container -->
  <div id="modalContainer" class="modal-overlay">
    <div class="modal" id="modalBox">
      <!-- Injected dynamically -->
    </div>
  </div>

  <!-- Side Drawer Container -->
  <div id="drawerContainer" class="drawer-overlay" onclick="closeDrawer(event)">
    <div class="drawer-content" id="drawerContent">
      <!-- Injected dynamically -->
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
